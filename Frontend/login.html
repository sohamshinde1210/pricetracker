<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — PriceRadar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base: #0a0a0f;
      --bg-surface: #111118;
      --bg-card: #16161f;
      --bg-elevated: #1c1c28;
      --border: #2a2a3d;
      --accent: #6c63ff;
      --accent-glow: rgba(108, 99, 255, 0.3);
      --accent-soft: rgba(108, 99, 255, 0.12);
      --accent-2: #00d4aa;
      --text-primary: #f0f0ff;
      --text-secondary: #9999bb;
      --text-muted: #5a5a7a;
      --warn: #ff6b6b;
      --warn-soft: rgba(255, 107, 107, 0.12);
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
    }

    .orb-1 {
      width: 500px; height: 500px;
      background: var(--accent);
      top: -200px; left: -150px;
      animation: float1 12s ease-in-out infinite;
    }

    .orb-2 {
      width: 400px; height: 400px;
      background: var(--accent-2);
      bottom: -150px; right: -100px;
      animation: float2 15s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(40px, 30px); }
    }

    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-30px, -20px); }
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .auth-brand {
      text-align: center;
      margin-bottom: 40px;
    }

    .auth-brand-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      margin: 0 auto 16px;
      box-shadow: 0 0 40px var(--accent-glow);
    }

    .auth-brand-name {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .auth-brand-name span { color: var(--accent); }

    .auth-brand-tagline {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }

    .auth-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .auth-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 18px; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .form-control {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: var(--font-body);
      transition: border-color 0.18s, box-shadow 0.18s;
      outline: none;
    }

    .form-control:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .form-control::placeholder { color: var(--text-muted); }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all 0.18s ease;
      margin-top: 8px;
      box-shadow: 0 0 30px var(--accent-glow);
    }

    .btn-submit:hover {
      background: #7c74ff;
      transform: translateY(-1px);
      box-shadow: 0 4px 40px var(--accent-glow);
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .auth-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover { text-decoration: underline; }

    .error-msg {
      background: var(--warn-soft);
      border: 1px solid rgba(255,107,107,0.3);
      color: var(--warn);
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
    }

    .input-wrapper .form-control {
      padding-right: 40px;
    }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="auth-container">
    <div class="auth-brand">
      <div class="auth-brand-icon">📡</div>
      <div class="auth-brand-name">Price<span>Radar</span></div>
      <div class="auth-brand-tagline">Real-time competitor price intelligence</div>
    </div>

    <div class="auth-card">
      <div class="auth-title">Welcome back</div>
      <div class="auth-subtitle">Sign in to your account to continue</div>

      {% if error %}
      <div class="error-msg"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-control" type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrapper">
            <input class="form-control" type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password" />
            <span class="input-icon" onclick="togglePw()"><i class="fas fa-eye" id="eye-icon"></i></span>
          </div>
        </div>

        <button type="submit" class="btn-submit">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/signup">Create one free</a>
      </div>
    </div>
  </div>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script>
    function togglePw() {
      const pw = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        pw.type = 'password';
        icon.className = 'fas fa-eye';
      }
    }
  </script>
</body>
</html>
